<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Менеджер закупок Luzi{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="/static/css/main.css">
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
<div class="container-fluid">
<nav class="navbar navbar-expand-lg navbar-light bg-white rounded shadow-sm mb-4 px-3">
<a class="navbar-brand" href="/">🌸 Менеджер закупок Luzi</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Дашборд</a></li>
<li class="nav-item"><a class="nav-link" href="/zakupka/new"><i class="bi bi-plus-circle"></i> Новая закупка</a></li>
<li class="nav-item"><a class="nav-link" href="/nalichie/new"><i class="bi bi-box"></i> + Наличие</a></li>
<li class="nav-item"><a class="nav-link" href="/nalichie"><i class="bi bi-list-ul"></i> Заказы наличия</a></li>
<li class="nav-item"><a class="nav-link" href="/buyers"><i class="bi bi-people"></i> Покупатели</a></li>
</ul>
</div>
</nav>
{% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
