<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Менеджер закупок Luzi{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            padding-top: 20px;
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: bold;
            color: #6f42c1 !important;
        }
        .status-checkbox {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #6f42c1;
        }
        .progress {
            height: 25px;
            margin: 10px 0;
        }
        .progress-bar {
            background-color: #6f42c1;
            font-size: 14px;
            line-height: 25px;
        }
        .table th {
            background-color: #f1f0ff;
            position: sticky;
            top: 0;
        }
        .btn-primary {
            background-color: #6f42c1;
            border-color: #6f42c1;
        }
        .btn-primary:hover {
            background-color: #5a32a8;
            border-color: #5a32a8;
        }
        .btn-success {
            background-color: #28a745;
        }
        .nav-tabs .nav-link.active {
            border-bottom: 3px solid #6f42c1;
            font-weight: bold;
        }
        .nav-tabs .nav-link {
            color: #495057;
        }
        .source-badge {
            font-size: 0.7em;
            padding: 2px 6px;
            border-radius: 10px;
        }
        .source-zakupka {
            background-color: #d4edda;
            color: #155724;
        }
        .source-nalichie {
            background-color: #fff3cd;
            color: #856404;
        }
        .table-row-done {
            background-color: #f0fff0 !important;
        }
        .table-hover tbody tr:hover {
            background-color: #f5f0ff;
        }
        .dashboard-card {
            transition: transform 0.2s;
        }
        .dashboard-card:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <!-- Навигация -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white rounded shadow-sm mb-4 px-3">
            <a class="navbar-brand" href="/">🌸 Менеджер закупок Luzi</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i> Дашборд</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/zakupka/new"><i class="bi bi-plus-circle"></i> Новая закупка</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/nalichie/new"><i class="bi bi-box"></i> + Наличие</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/nalichie"><i class="bi bi-list-ul"></i> Заказы наличия</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/buyers"><i class="bi bi-people"></i> Покупатели</a>
                    </li>
                </ul>
            </div>
        </nav>

        <!-- Основной контент -->
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
